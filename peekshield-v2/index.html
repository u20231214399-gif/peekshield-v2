<nav>
  <button class="active" onclick="showPage('registrar',this)">👤 Registrar Estudiante</button>
  <button onclick="showPage('asistencia',this)">📸 Tomar Asistencia</button>
  <button onclick="showPage('historial',this)">📋 Historial</button>
</nav>

<div id="loadingModels">⏳ Cargando sistema de reconocimiento facial...</div>

<div id="page-registrar" class="page active">
  <h2>Registrar Estudiante</h2>
  <video id="videoRegistro" autoplay playsinline muted></video>
  <canvas id="canvasRegistro" data-vacio="true"></canvas>
  <button class="btn secondary" onclick="capturarFotoRegistro()">📸 Capturar Foto</button>
  <div class="divider"></div>
  <div class="campo-label">Nombre completo</div>
  <input type="text" id="inputNombre" placeholder="Ej: Maria Fernanda Cortes"/>
  <div class="campo-label">Codigo estudiantil</div>
  <input type="text" id="inputCodigo" placeholder="Ej: 2023121439"/>
  <button class="btn gold" onclick="registrarEstudiante()">✅ Registrar Estudiante</button>
  <div class="status" id="statusRegistrar"></div>
</div>

<div id="page-asistencia" class="page">
  <h2>Tomar Asistencia</h2>
  <div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <div id="faceOverlay"></div>
  </div>
  <div class="status" id="statusAsistencia">Acercate a la camara...</div>
  <div style="margin-top:16px;display:none" id="btnSiguienteWrap">
    <button class="btn" onclick="siguienteEstudiante()">➡️ Siguiente Estudiante</button>
  </div>
</div>

<div id="page-historial" class="page">
  <h2>Historial de Asistencia</h2>
  <div class="filtros">
    <input type="date" id="filtroFecha"/>
    <button class="btnSmall" onclick="cargarHistorial()">🔍 Filtrar</button>
    <button class="btnSmall gold" onclick="exportarExcel()">⬇️ Exportar Excel</button>
  </div>
  <div id="listaHistorial"></div>
</div>

<div id="modalFoto" onclick="this.classList.remove('visible')">
  <img id="modalImg" src=""/>
</div>

<script src="js/app.js"></script>
<script src="js/registrar.js"></script>
<script src="js/asistencia.js"></script>
<script src="js/historial.js"></script>
<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
Promise.all([
  faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
  faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
  faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
]).then(() => {
  document.getElementById('loadingModels').style.display = 'none';
  iniciarCamaraRegistro();
}).catch(e => {
  document.getElementById('loadingModels').textContent = 'Error cargando modelos: ' + e.message;
});
</script>
